{% load static %}
<section class="bg-dark text-white py-5 border-top border-warning border-2">
  <div class="container">
    <div class="row align-items-center justify-content-between g-4">
      <div class="col-lg-6">
        <h4 class="fw-bold mb-1 text-warning">Get the Junior Mining Starter Checklist</h4>
        <p class="mb-0 text-secondary">The 12-point checklist we run on every company before adding it to the watchlist. Free. No spam.</p>
      </div>
      <div class="col-lg-5">
        <form action="{% url 'leads:subscribe' %}" method="post" id="subscribeBarForm">
          {% csrf_token %}
          <input type="hidden" name="source" value="homepage">
          <input type="text" name="website" style="display:none" tabindex="-1" autocomplete="off">
          <div class="input-group">
            <input type="email" name="email" class="form-control form-control-lg bg-dark text-white border-secondary"
                   placeholder="your@email.com" required>
            <button class="btn btn-warning fw-bold" type="submit">Get It Free</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
