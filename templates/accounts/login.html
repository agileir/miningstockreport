{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:440px;">
  <div class="card bg-dark border-secondary">
    <div class="card-body p-4">
      <h2 class="text-white fw-bold mb-1">Log in</h2>
      <p class="text-secondary small mb-4">Access your subscriber content.</p>
      <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-warning fw-bold w-100 mt-3">Log In</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
